name: Ada SPARK Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ada/SPARK environment
      run: |
        sudo apt-get update
        sudo apt-get install -y gnat gprbuild spark2014
    
    - name: Build project
      run: |
        gprbuild -P. -v
    
    - name: Run SPARK verification
      run: |
        gnatprove -P. --level=4 --prove=all
    
    - name: Run tests
      run: |
        gprbuild -P. -Xmode=test -v
